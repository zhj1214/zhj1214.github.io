<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>七夕快乐</title>
  </head>
  <body class="monochrome">
    <script src="./biaobai/jquery.min.js"></script>
    <script
      type="text/javascript"
      src="https://static.runoob.com/assets/qrcode/qrcode.min.js"
    ></script>
    <div class="title" style="margin-top: 10vh;">
      请输入你要展示的文字，例如：我/爱/你
    </div>
    <div class="title" style="margin: 20px 0px;">
      ”/“隔开，表示一个烟花代表一个汉字
    </div>
    <input id="param" type="text" name="param" />
    <div class="qrcodeView" style="display: none;">
      <div id="qrcode" style="display: flex; justify-content: center;"></div>
    </div>
    <div class="title" style="margin: 20px 0px;">
      截屏保存二维码，扫码查看效果
    </div>
    <div id="shengcheng" class="bottom title">生成二维码</div>
    <script type="text/javascript">
      var qr;
      $("#shengcheng").click(function (event) {
        var name = $('input[name="param"]').val();
        if (!name) return;
        name = "https://zhj1214.github.io/qixi/biaobai/fire.html?qx=" + name;
        // console.log(name)
        $(".qrcodeView").attr("style", "display:block;"); //显示div
        if (qr) {
          qr.makeCode(name); // 生成另外一个二维码
        } else {
          qr = new QRCode(document.getElementById("qrcode"), name); // 设置要生成二维码的链接
        }
      });
    </script>
    
    <style>
      #param {
        width: 80vw;
        margin: 4vw 0px 4vw 10vw;
      }
      .qrcodeView {
        background-color: white;
        padding: 32px;
        display: flex;

        align-items: center;
        justify-content: center;
      }
      .title {
        width: 100vw;
        text-align: center;
        color: white;
        font-size: 16px;
      }
      .bottom {
        position: fixed;
        bottom: 36px;
        width: 100%;
      }
      .bottomText {
        display: inline-block;
        width: 100vw;
        height: 40px;
        text-align: center;
      }
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: #000;
        overflow: hidden;
      }
      .heart {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        width: 200px;
        height: 260px;
        margin: auto;
        transform-style: preserve-3d;
        perspective: 800px;
        animation: rot 15s linear infinite;
      }
      @keyframes rot {
        from {
          transform: rotateY(0deg) rotateX(0deg);
        }
        to {
          transform: rotateY(360deg) rotateX(360deg);
        }
      }
      .rib {
        position: absolute;
        width: 200px;
        height: 260px;
        border: solid red;
        border-width: 1px 1px 0 0;
        border-radius: 100% 100% 0/40% 100% 0;
        transition: all 1s;
      }
      .cube {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        width: 100px;
        height: 100px;
        color: red;
        transform-style: preserve-3d;
        transform: translateZ(50px);
      }
      .cube div {
        position: absolute;
        width: 100px;
        height: 100px;
      }
      .cube div:nth-child(1) {
        left: 0;
        top: -100px;
        transform-origin: bottom;
        transform: rotateX(90deg);
      }
      .cube div:nth-child(2) {
        left: 0;
        top: 100px;
        transform-origin: top;
        transform: rotateX(-90deg);
      }
      .cube div:nth-child(3) {
        left: -100px;
        top: 0px;
        transform-origin: right;
        transform: rotateY(-90deg);
      }
      .cube div:nth-child(4) {
        left: 100px;
        top: 0px;
        transform-origin: left;
        transform: rotateY(90deg);
      }
      .cube div:nth-child(5) {
        left: 0;
        top: 0px;
      }
      .cube div:nth-child(6) {
        left: 0;
        top: 0px;
        transform: translateZ(-100px);
      }
    </style>
  </body>
</html>
